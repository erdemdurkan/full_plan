
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Montaj Program Hesaplayıcı</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style/dist/xlsx.bundle.js"></script>

<style>
body{
font-family:Arial;
margin:0;
min-height:100vh;
background:url("beko.png") no-repeat center center fixed;
background-size:cover;
display:flex;
align-items:center;
padding-left:60px;
}
.panel{
background:rgba(0,0,0,0.65);
padding:25px;
border-radius:10px;
width:640px;
color:white;
backdrop-filter: blur(6px);
}
button{padding:10px 18px;font-size:16px;margin-top:12px}
  .header{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
}

.header-icon{
font-size:28px;
background:#0aa6ff;
width:46px;
height:46px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
}

.header h1{
margin:0;
font-size:22px;
font-weight:600;
}

.header p{
margin:0;
font-size:13px;
color:#cfd8dc;
}

.divider{
border:none;
height:1px;
background:rgba(255,255,255,0.15);
margin-bottom:20px;
}
  /* LABEL */

label{
font-size:13px;
color:#cfd8dc;
margin-top:10px;
display:block;
}

/* FILE INPUT */

.file-input{
width:100%;
margin-top:6px;
padding:8px;
border-radius:6px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
font-size:13px;
}

/* SELECT */

.select-modern{
width:100%;
padding:8px;
border-radius:6px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
margin-top:6px;
}

/* BUTTON */

.btn-modern{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:14px;
font-weight:600;
background:linear-gradient(135deg,#0aa6ff,#0077ff);
color:white;
cursor:pointer;
transition:0.2s;
}

.btn-modern:hover{
transform:translateY(-1px);
box-shadow:0 5px 15px rgba(0,150,255,0.4);
}
</style>

</head>

<body>

<div class="panel">

<div class="header">
    <div class="header-icon">⚙️</div>
    <div>
        <h1>Montaj Program</h1>
        <p>Excel montaj planını otomatik güncelle</p>
    </div>
</div>

<hr class="divider">

<p>EX_STOK.xlsx</p>
<input class="file-input" type="file" id="stok"><br><br>

<p>EX_URETIM2.xlsx</p>
<input class="file-input" type="file" id="uretim"><br><br>

<p>MONTAJ_PROGRAM_OLUSTUR.xlsm</p>
<input class="file-input" type="file" id="montaj"><br><br>

<p>Gün sıralaması</p>

<select id="gun" class="select-modern">
<option value="BUGUN,CUMARTESİ,PAZAR">BUGUN,CUMARTESİ,PAZAR</option>
<option value="BUGUN,PAZAR,PAZARTESİ">BUGUN,PAZAR,PAZARTESİ</option>
<option value="BUGUN,PAZARTESİ,SALI">BUGUN,PAZARTESİ,SALI</option>
<option value="BUGUN,SALI,ÇARŞAMBA">BUGUN,SALI,ÇARŞAMBA</option>
<option value="BUGUN,ÇARŞAMBA,PERŞEMBE">BUGUN,ÇARŞAMBA,PERŞEMBE</option>
<option value="BUGUN,PERŞEMBE,CUMA">BUGUN,PERŞEMBE,CUMA</option>
<option value="BUGUN,CUMA,CUMARTESİ">BUGUN,CUMA,CUMARTESİ</option>
</select>

<br>
<button class="btn-modern" onclick="baslat()">
⚡ Hesapla
</button>

<p id="durum"></p>

</div>

<script>

function first3(v){
if(!v) return ""
return v.toString().substring(0,3)
}

async function readExcel(file){
const data = await file.arrayBuffer()
const wb = XLSX.read(data)
const ws = wb.Sheets[wb.SheetNames[0]]
return XLSX.utils.sheet_to_json(ws,{defval:0})
}

async function baslat(){

document.getElementById("durum").innerText="Dosyalar okunuyor..."

const stokFile=document.getElementById("stok").files[0]
const uretimFile=document.getElementById("uretim").files[0]
const montajFile=document.getElementById("montaj").files[0]

if(!stokFile || !uretimFile || !montajFile){
alert("3 Excel dosyasını seçmelisiniz")
return
}

const stok=await readExcel(stokFile)
const uretim=await readExcel(uretimFile)

let stokMap={}

stok.forEach(r=>{
if(r.SORGULAMA_NOKTASI=="AYAR" || r.SORGULAMA_NOKTASI=="MONTAJ"){
let kod=first3(r.SASI_KODU)
stokMap[kod]=(stokMap[kod]||0)+Number(r.ADETLER)
}
})

uretim.forEach(r=>{
let kod=first3(r.SASI_KODU)
stokMap[kod]=(stokMap[kod]||0)+Number(r.ADETLER)
})

document.getElementById("durum").innerText="Montaj dosyası okunuyor..."

const data=await montajFile.arrayBuffer()
const wb=XLSX.read(data)
const ws=wb.Sheets["MONTAJPROGRAM"]

let rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""})

rows = rows.filter(r => r.some(c => c !== ""))

let header = rows[0]

let sasiCol = header.findIndex(h=>String(h).toUpperCase().includes("SASI"))
let planCol = header.findIndex(h=>String(h).toUpperCase().includes("PLAN"))
let gunCol  = header.findIndex(h=>String(h).toUpperCase().includes("GÜN"))

const days=["BUGUN","PAZARTESİ","SALI","ÇARŞAMBA","PERŞEMBE","CUMA","CUMARTESİ","PAZAR"]

let start=document.getElementById("gun").value.split(",")
let order=[...start]

days.forEach(d=>{
if(!order.includes(d)) order.push(d)
})

let dataRows = rows.slice(1)

dataRows.sort((a,b)=>{
return order.indexOf(a[gunCol]) - order.indexOf(b[gunCol])
})

dataRows.forEach(r=>{

let kod=first3(r[sasiCol])
let plan=Number(r[planCol])||0
let stok=stokMap[kod]||0

if(stok<=0) return

if(stok>=plan){
stokMap[kod]-=plan
r[planCol]=0
}else{
r[planCol]=plan-stok
stokMap[kod]=0
}

})

dataRows = dataRows.filter(r => Number(r[planCol]) !== 0)

rows=[header,...dataRows]

let removeCols=[6,5,3,1]

removeCols.forEach(col=>{
rows.forEach(r=>{
r.splice(col,1)
})
})

let colCount=rows[0].length

for(let c=colCount-1;c>=0;c--){

let empty=true

for(let r=0;r<rows.length;r++){
if(rows[r][c]!=="" && rows[r][c]!=null){
empty=false
break
}
}

if(empty){
rows.forEach(row=>row.splice(c,1))
}

}

const newWs=XLSX.utils.aoa_to_sheet(rows)

for(let r=0;r<rows.length;r++){

let rowIndex=r+1

for(let c=0;c<rows[0].length;c++){

let colLetter=XLSX.utils.encode_col(c)
let cellRef=colLetter+rowIndex

if(!newWs[cellRef]) continue

let style={
font:{name:"Calibri",sz:9,color:{rgb:"000000"}}
}

if(["A","D","E","H","J"].includes(colLetter)){
style.font.color={rgb:"808080"}
}

if(colLetter==="K"){
style.font.color={rgb:"000080"}
}

if(colLetter==="B"){
style.fill={fgColor:{rgb:"AFEEEE"}}
}

newWs[cellRef].s=style

}

}

/* AUTO COLUMN WIDTH */

let cols=[]

for(let c=0;c<rows[0].length;c++){

let max=0

for(let r=0;r<rows.length;r++){

let val=rows[r][c]

if(val){
max=Math.max(max,val.toString().length)
}

}

let width=Math.max(max+2,9)

cols.push({wch:width})

}

newWs["!cols"]=cols

/* HEADER FREEZE */

newWs["!freeze"]={xSplit:0,ySplit:1}

/* AUTOFILTER */

newWs["!autofilter"] = { ref: XLSX.utils.encode_range({
s:{r:0,c:0},
e:{r:rows.length-1,c:rows[0].length-1}
}) }

const newWb=XLSX.utils.book_new()
XLSX.utils.book_append_sheet(newWb,newWs,"MONTAJPROGRAM")

XLSX.writeFile(newWb,"MONTAJ_PROGRAM_GUNCEL.xlsx")

document.getElementById("durum").innerText="Tamamlandı"

}

</script>

</body>
</html>
